        operator: Exists
      - effect: NoExecute
        key: node.kubernetes.io/not-ready
        operator: Exists
        tolerationSeconds: 300
      - effect: NoExecute
        key: node.kubernetes.io/unreachable
        operator: Exists
        tolerationSeconds: 300
      - effect: NoSchedule
        key: node.kubernetes.io/memory-pressure
        operator: Exists
    scanTolerations:
    - operator: Exists
    scanType: Node
    scannerType: OpenSCAP
    showNotApplicable: false
    strictNodeScan: true
    timeout: 30m
