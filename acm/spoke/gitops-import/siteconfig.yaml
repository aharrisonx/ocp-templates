apiVersion: agent-install.openshift.io/v1beta1
kind: SiteConfig
metadata:
  name: "spoke-cluster-1"
  namespace: "spoke-cluster-1"
spec:
  baseDomain: "example.com"
  pullSecretRef:
    name: "assisted-deployment-pull-secret" # Ensure this secret exists in the namespace
  clusterImageSetNameRef: "img4.14.0-x86-64-appsub" # Match your desired OCP version
  sshPublicKey: "ssh-rsa AAAAB3Nza..." 
  clusters:
    - clusterName: "spoke-cluster-1"
      networkType: "OVNKubernetes"
      clusterLabels:
        cloud: "Baremetal"
        vendor: "OpenShift"
      clusterNetwork:
        - cidr: 10.128.0.0/14
          hostPrefix: 23
      serviceNetwork:
        - 172.30.0.0/16
      additionalNTPSources:
        - 0.pool.ntp.org
      # Provisioning details
      nodes:
        - hostName: "master-0.spoke-cluster-1.example.com"
          role: "master"
          # The bmc details allow ACM to boot the server via iPXE/Redfish
          bmcAddress: "idrac-virtualmedia+https://<BMC_IP>/redfish/v1/Systems/System.Embedded.1"
          bmcCredentialsName:
            name: "bmc-secret-node-0"
          bootMACAddress: "AA:BB:CC:DD:EE:FF"
          rootDeviceHints:
            deviceName: "/dev/sda"
          nodeNetwork:
            interfaces:
              - name: enp1s0
                macAddress: "AA:BB:CC:DD:EE:FF"
            config:
              interfaces:
                - name: enp1s0
                  type: ethernet
                  state: up
                  ipv4:
                    enabled: true
                    address:
                      - ip: 192.168.1.10
                        prefix-length: 24
              routes:
                config:
                  - destination: 0.0.0.0/0
                    next-hop-address: 192.168.1.1
                    next-hop-interface: enp1s0
