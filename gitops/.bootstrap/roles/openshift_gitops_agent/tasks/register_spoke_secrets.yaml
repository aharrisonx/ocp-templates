- name: Request spoke certificates
  kubernetes.core.k8s:
    template: 
    - argocd-agent-registration/argocd-principal-certificate.yaml
    - argocd-agent-registration/argocd-agent-certificate.yaml
    - argocd-agent-registration/namespace.yaml

- name: Retrieve Spoke Principal Certificate
  kubernetes.core.k8s_info:
    kind: Secret
    name: argocd-principal-{{ ocp_preferred_cluster_name }}
    namespace: "{{ gitops_instance_namespace }}"
  register: hub_secret_output
  until:
    - hub_secret_output.resources | length > 0
  retries: 5
  delay: 1

- name: Set secret data as a fact for easy access
  ansible.builtin.set_fact:
    hub_secret: "{{ hub_secret_output.resources[0] }}"

- name: Register Spoke Principal Cert with Hub
  kubernetes.core.k8s:
    template: argocd-agent-registration/argocd-agent-cluster-secret.yaml