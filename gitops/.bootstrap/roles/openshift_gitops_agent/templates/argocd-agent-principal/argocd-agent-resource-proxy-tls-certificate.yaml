---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-agent-resource-proxy-tls
  namespace: "{{ gitops_instance_namespace }}"
spec:
  secretName: argocd-agent-resource-proxy-tls
  issuerRef:
    name: argocd-agent-ca
    kind: Issuer
  commonName: argocd-agent-principal-resource-proxy
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - argocd-agent-principal-resource-proxy.{{ gitops_instance_namespace }}.svc.cluster.local
    - argocd-agent-principal-resource-proxy.{{ gitops_instance_namespace }}.svc
  usages:
    - server auth
