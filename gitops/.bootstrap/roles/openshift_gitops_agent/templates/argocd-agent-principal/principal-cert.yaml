---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-agent-principal-tls
  namespace: "{{ gitops_instance_namespace }}"
spec:
  dnsNames:
  - argocd-agent-principal-{{ gitops_instance_namespace }}.apps.{{ ocp_base_domain }}
  issuerRef:
    name: argocd-agent-ca
    kind: Issuer
  commonName: principal
  secretName: argocd-agent-principal-tls
  subject:
    organizationalUnits:
      - "{{ ocp_base_domain }}"
