---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-agent-{{ ocp_preferred_cluster_name }}
  namespace: "{{ gitops_instance_namespace }}"
spec:
  secretName: argocd-agent-{{ ocp_preferred_cluster_name }}
  issuerRef:
    name: argocd-agent-ca
    kind: Issuer
  commonName: argocd-agent-{{ ocp_preferred_cluster_name }}
  subject:
    organizationalUnits:
      - "{{ ocp_base_domain }}"
  usages:
    - client auth
  dnsNames:
  - argocd-agent-{{ ocp_preferred_cluster_name }}.{{ ocp_base_domain }}
