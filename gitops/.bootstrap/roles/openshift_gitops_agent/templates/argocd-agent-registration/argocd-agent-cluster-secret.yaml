---
apiVersion: v1
kind: Secret
metadata:
  name: "argocd-agent-{{ ocp_preferred_cluster_name }}-cluster"
  namespace: "{{ gitops_instance_namespace }}"
  labels:
    argocd.argoproj.io/secret-type: cluster
    argocd-agent.argoproj-labs.io/agent-name: "argocd-agent-{{ ocp_preferred_cluster_name }}"
stringData:
  name: "argocd-agent-{{ ocp_preferred_cluster_name }}"
  server: "https://argocd-agent-principal-resource-proxy.{{ gitops_instance_namespace }}.svc.cluster.local:9090?agentName=argocd-agent-{{ ocp_preferred_cluster_name }}"
  config: |
    {{ {
      "tlsClientConfig": {
        "insecure": false,
        "certData": hub_secret.data['tls.crt'],
        "keyData": hub_secret.data['tls.key'],
        "caData": hub_secret.data['ca.crt']
      }
    } | to_nice_json(indent=2) | indent(4) }}