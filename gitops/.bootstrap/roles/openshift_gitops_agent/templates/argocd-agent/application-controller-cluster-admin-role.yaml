kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: agent-application-controller-cluster-admin
subjects:
  - kind: ServiceAccount
    name: "{{ gitops_instance_name }}-argocd-application-controller"
    namespace: "{{ gitops_agent_namespace }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
