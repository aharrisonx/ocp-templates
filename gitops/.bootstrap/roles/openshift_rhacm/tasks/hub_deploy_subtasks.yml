- name: Deploy RHACM operator
  kubernetes.core.k8s:
    template:
      - operator/namespace.yaml
      - operator/operatorgroup.yaml
      - operator/subscription.yaml

- import_role:
    name: openshift_common
    tasks_from: install_plan_approve_subtasks.yml
  vars:
    subscription_name: advanced-cluster-management
    subscription_namespace: open-cluster-management

- import_role:
    name: openshift_common
    tasks_from: wait_for_operator.yml
  vars:
    subscription_name: advanced-cluster-management
    subscription_namespace: open-cluster-management

- name: Deploy MultiClusterHub
  kubernetes.core.k8s:
    template:
      - instance/multiclusterhub.yaml

- import_role:
    name: openshift_common
    tasks_from: install_plan_approve_subtasks.yml
  vars:
    subscription_name: multicluster-engine
    subscription_namespace: multicluster-engine

- name: Wait until managedcluster local-cluster object is available
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: local-cluster
  register: managedcluster
  until:
    - managedcluster.resources.0.status.conditions is defined
    - managedcluster.resources.0.status.conditions | selectattr('type', 'equalto', 'ManagedClusterConditionAvailable') | list | length > 0
    - (managedcluster.resources.0.status.conditions | selectattr('type', 'equalto', 'ManagedClusterConditionAvailable') | first).status == "True"
  retries: 80
  delay: 10
