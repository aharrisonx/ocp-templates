---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/node-fence-operator/
  
patches:
  - target:
      kind: OperatorPolicy
      name: node-fence-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable
      - op: add
        path: /spec/versions/-
        value: "fence-agents-remediation.v0.6.1"
