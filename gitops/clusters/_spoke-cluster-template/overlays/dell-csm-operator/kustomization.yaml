---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/dell-csm-operator/

patches:
  - target:
      kind: OperatorPolicy
      name: dell-csm-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable  
      - op: add
        path: /spec/versions/-
        value: "dell-csm-operator-certified.v1.11.2"     
      - op: add
        path: /spec/versions/-
        value: "dell-csm-operator-certified.v1.11.3"