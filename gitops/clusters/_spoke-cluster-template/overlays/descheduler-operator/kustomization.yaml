---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/descheduler-operator/

patches:
  - target:
      kind: OperatorPolicy
      name: descheduler-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable
      - op: add
        path: /spec/versions/-
        value: "clusterkubedescheduleroperator.v5.3.2"