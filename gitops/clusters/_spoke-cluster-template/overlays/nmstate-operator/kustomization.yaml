---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/nmstate-operator/

patches:
  - target:
      kind: OperatorPolicy
      name: nmstate-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable
      - op: add
        path: /spec/versions/-
        value: "kubernetes-nmstate-operator.4.20.0-202602180432"
