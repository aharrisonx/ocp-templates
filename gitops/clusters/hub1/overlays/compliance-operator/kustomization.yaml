---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/compliance-operator/

patches:
  - target:
      kind: OperatorPolicy
      name: compliance-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable
      - op: add
        path: /spec/versions/-
        value: "compliance-operator.v1.8.2"
