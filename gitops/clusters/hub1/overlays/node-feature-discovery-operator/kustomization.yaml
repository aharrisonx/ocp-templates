---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/node-feature-discovery-operator/

patches:
  - target:
      kind: OperatorPolicy
      name: nfd-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable
      - op: add
        path: /spec/versions/-
        value: "nfd.4.20.0-202603051149"
