---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/node-maintenance-operator/

patches:
  - target:
      kind: OperatorPolicy
      name: node-maintenance-operator-policy
    patch: |
      - op: replace
        path: /spec/subscription/channel
        value: stable
      - op: add
        path: /spec/versions/-
        value: "node-maintenance-operator.v5.5.0"
