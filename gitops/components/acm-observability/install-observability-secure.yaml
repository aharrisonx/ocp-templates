---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
  name: acm-cli-job-sa-role
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
      - list
      - create
      - patch
  - apiGroups:
      - objectbucket.io
    resources:
      - objectbucketclaims
    verbs:
      - get
      - list
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: acm-gitops-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: acm-cli-job-sa-role
subjects:
  - kind: ServiceAccount
    name: cli-job-sa
    namespace: open-cluster-management-observability
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cli-job-sa
  namespace: open-cluster-management-observability
---
apiVersion: batch/v1
kind: Job
metadata:
  name: observability-setup
  namespace: open-cluster-management-observability
spec:
  template:
    spec:
      containers:
        - image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |

              echo "Define pull-secret for MultiClusterHub Operator"
              DOCKER_CONFIG_JSON=`oc extract secret/pull-secret -n openshift-config --to=-`
              oc create secret generic multiclusterhub-operator-pull-secret \
                  -n open-cluster-management-observability \
                  --from-literal=.dockerconfigjson="$DOCKER_CONFIG_JSON" \
                  --type=kubernetes.io/dockerconfigjson

              echo "Retreive acm-observability bucket ACCESS_KEY and SECRET_KEY"
              ACCESS_KEY=""
              SECRET_KEY=""
              while [[ z$ACCESS_KEY == z ]]; do
                 echo "Wait for acm-observability bucket to be created, sleep 3 seconds"
                 sleep 3
                 ACCESS_KEY=$(oc get secret acm-observability -n open-cluster-management-observability --template={{.data.AWS_ACCESS_KEY_ID}} | base64 -d)
                 SECRET_KEY=$(oc get secret acm-observability -n open-cluster-management-observability --template={{.data.AWS_SECRET_ACCESS_KEY}} | base64 -d)
              done;

              echo "Retreive bucket NAME"
              BUCKET_NAME=$(oc get ObjectBucketClaim acm-observability -n  open-cluster-management-observability --template={{.spec.bucketName}})

              echo "Retrieve service CA certificate for secure S3 connection"
              # Try to get OpenShift service CA certificate
              SERVICE_CA_CERT=$(oc get configmap openshift-service-ca -n openshift-service-ca -o jsonpath='{.data.service-ca\.crt}' 2>/dev/null)
              if [[ -z "$SERVICE_CA_CERT" ]]; then
                # Fallback to cluster root CA
                SERVICE_CA_CERT=$(oc get configmap kube-root-ca.crt -n openshift-service-ca -o jsonpath='{.data.ca\.crt}' 2>/dev/null)
              fi
              if [[ -z "$SERVICE_CA_CERT" ]]; then
                # Fallback to open-cluster-management-observability namespace
                SERVICE_CA_CERT=$(oc get configmap kube-root-ca.crt -n open-cluster-management-observability -o jsonpath='{.data.ca\.crt}' 2>/dev/null)
              fi
              if [[ -z "$SERVICE_CA_CERT" ]]; then
                # Final fallback to default namespace
                SERVICE_CA_CERT=$(oc get configmap kube-root-ca.crt -n default -o jsonpath='{.data.ca\.crt}' 2>/dev/null)
              fi              

              oc get secret thanos-object-storage -n open-cluster-management-observability
              if [[ $? == 1 ]]
              then
                echo "Create thanos object storage configuration with secure HTTPS connection (port 443)"

                if [[ -n "$SERVICE_CA_CERT" ]]; then
                  # Create secret with CA certificate stored for potential mounting
                  # Thanos will use OpenShift's service CA certificate available in pods
                  echo "---
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: thanos-object-storage
                    namespace: open-cluster-management-observability
                  type: Opaque
                  stringData:
                    thanos.yaml: |
                      type: s3
                      config:
                        bucket: $BUCKET_NAME
                        endpoint: s3.openshift-storage.svc:443
                        insecure: false
                        access_key: $ACCESS_KEY
                        secret_key: $SECRET_KEY
                        http_config:
                          tls_config:
                            # Use OpenShift service CA certificate (injected by OpenShift)
                            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
                            insecure_skip_verify: false
                    ca.crt: |
              $(echo "$SERVICE_CA_CERT" | sed 's/^/       /')" | oc create -f -
                  echo "Created secure Thanos configuration with CA certificate"
                else
                  echo "Warning: CA certificate not found. Creating configuration with TLS verification disabled."
                  echo "Note: For production, ensure CA certificate is properly configured."
                  echo "---
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: thanos-object-storage
                    namespace: open-cluster-management-observability
                  type: Opaque
                  stringData:
                    thanos.yaml: |
                      type: s3
                      config:
                        bucket: $BUCKET_NAME
                        endpoint: s3.openshift-storage.svc:443
                        insecure: false
                        access_key: $ACCESS_KEY
                        secret_key: $SECRET_KEY
                        http_config:
                          tls_config:
                            insecure_skip_verify: true" | oc create -f -
                fi
              fi
              echo -n "thanos object storage configuration already exists"

          imagePullPolicy: IfNotPresent
          name: observability-setup
      dnsPolicy: ClusterFirst
      restartPolicy: OnFailure
      serviceAccount: cli-job-sa
      serviceAccountName: cli-job-sa
      terminationGracePeriodSeconds: 30