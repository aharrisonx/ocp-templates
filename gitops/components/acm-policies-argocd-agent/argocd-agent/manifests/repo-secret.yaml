apiVersion: v1
kind: Secret
metadata:
  name: repo-ssh
  namespace: argocd-agent
  labels:
    argocd.argoproj.io/secret-type: repository
data:
  sshPrivateKey: '{{hub (fromSecret "argocd-agent" "repo-ssh" "sshPrivateKey") hub}}'
  type: '{{hub (fromSecret "argocd-agent" "repo-ssh" "type") hub}}'
  url: '{{hub (fromSecret "argocd-agent" "repo-ssh" "url") hub}}'