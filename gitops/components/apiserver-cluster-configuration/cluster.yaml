apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    oauth-apiserver.openshift.io/secure-token-storage: "true"
    release.openshift.io/create-only: "true"
  name: cluster
  ownerReferences:
  - apiVersion: config.openshift.io/v1
    kind: ClusterVersion
    name: version
    uid: 7c25b810-5198-4f0e-badc-f36689d6ed14
spec:
  audit:
    profile: Default
  servingCerts:
    namedCertificates:
    - names: 
      - api.hub1.ocp.jobu.net
      servingCertificate:
        name: cert-manager-api-cert-secret
 

