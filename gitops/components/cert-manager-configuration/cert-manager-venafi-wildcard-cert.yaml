apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-wildcard-cert
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretName: cert-manager-wildcard-cert-secret
  duration: 8784h0m0s
  renewBefore: 1440h0m0s
  subject:
    organizations:
    - ""
    localities:
    - ""
    countries:
    - ""
    provinces:
    - ""
  commonName: "*.apps.${CLUSTER_BASE_DOMAIN}"
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
  - "*.apps.${CLUSTER_BASE_DOMAIN}"
  issuerRef:
    name: cert-manager-venafi-wildcard-issuer
    kind: ClusterIssuer
