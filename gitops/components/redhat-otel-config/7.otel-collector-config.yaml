apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-metrics
  namespace: otel-o11y
spec:
  config:
    exporters:
      debug:
        verbosity: detailed
      otlphttp:
        endpoint: https://metrics.jobu.net/otlp
        headers:
          X-Scope-OrgID: "1"
      otlphttp/logs:
        endpoint: https://logs.jobu.net/otlp
        headers:
          X-Scope-OrgID: "1"
    processors:
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
      resourcedetection:
        detectors:
        - openshift
        override: true
    receivers:
      filelog:
        exclude:
        - /hostfs/var/log/pods/*/otc-container/*.log
        include:
        - /hostfs/var/log/pods/*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
        - id: container-parser
          type: container
        start_at: end
      hostmetrics:
        collection_interval: 60s
        initial_delay: 1s
        root_path: /
        scrapers: 
          cpu: {}
          memory: {}
          disk: {}
          load: {}
          filesystem: {}
          paging: {}
          processes: {}
          process: {}
      journald:
        all: true
        files: /var/log/journal/*/*
        priority: info
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_elapsed_time: 5m
          max_interval: 60s
        units:
        - kubelet
        - crio
        - init.scope
        - dnsmasq
      k8s_cluster:
        collection_interval: 60s
        distribution: openshift
      k8s_events: {}
      k8sobjects:
        auth_type: serviceAccount
        objects:
        - interval: 60s
          mode: pull
          name: pods
        - mode: watch
          name: events
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 60s
        endpoint: https://${env:K8S_NODE_NAME}:10250
        insecure_skip_verify: true
    service:
      pipelines:
        logs:
          exporters:
          - debug
          - otlphttp/logs
          processors:
          - k8sattributes
          - resourcedetection
          receivers:
          - k8sobjects
          - journald
          - k8s_events
          - k8s_cluster
          - filelog
        metrics:
          exporters:
          - debug
          - otlphttp
          processors:
          - k8sattributes
          - resourcedetection
          receivers:
          - hostmetrics
          - kubeletstats
          - k8s_cluster
      telemetry:
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
  configVersions: 3
  env:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  ipFamilyPolicy: SingleStack
  managementState: managed
  mode: daemonset
  replicas: 1
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETPCAP
      - SETUID
    readOnlyRootFilesystem: true
    runAsGroup: 0
    runAsUser: 0
    seLinuxOptions:
      type: spc_t
    seccompProfile:
      type: RuntimeDefault
  serviceAccount: otel
  targetAllocator:
    allocationStrategy: consistent-hashing
    collectorNotReadyGracePeriod: 30s
    filterStrategy: relabel-config
    prometheusCR:
      scrapeInterval: 30s
  upgradeStrategy: automatic
  volumeMounts:
  - mountPath: /etc/pki/ca-trust/source/service-ca
    name: cabundle-volume
    readOnly: true
  - mountPath: /hostfs
    name: host
    readOnly: true
  - mountPath: /var/log/journal/
    name: journal-logs
    readOnly: true
  volumes:
  - configMap:
      name: cabundle
    name: cabundle-volume
  - hostPath:
      path: /
    name: host
  - hostPath:
      path: /var/log/journal
    name: journal-logs
